# Terminal colors fix
set-option -sg escape-time 0
set-option -sa terminal-overrides ",xterm*:Tc"

# Mouse support
set -g mouse on

# Index windows and panes from 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set vi-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection

# Set repeat time to 1 second
set -g repeat-time 1000

# Resize panes
bind-key -r -T prefix K resize-pane -U 5
bind-key -r -T prefix J resize-pane -D 5
bind-key -r -T prefix H resize-pane -L 5
bind-key -r -T prefix L resize-pane -R 5

# Move current window left or right
bind-key -n C-Left swap-window -dt -1
bind-key -n C-Right swap-window -dt +1

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Remap prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Custom bindings
bind v copy-mode
bind P paste-buffer
bind / run-shell "tmux copy-mode; tmux send-keys ?"

# Reset & clear pane history
bind r send-keys -R \; send-keys C-l \; clear-history

# Style
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"

set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold]   #S #[fg=${gray_light},nobold] | "
set -g status-right "#[fg=${gray_light}] %Y-%m-%d %H:%M "
set -g window-status-current-format "#[fg=${cyan_soft},bold]  #[underscore]#I: #W#[nounderscore]#{?window_zoomed_flag, 󰍋 ,}"
set -g window-status-format " #I: #W"
set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${green_soft}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Install tpm if it's not there yet
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
