# Terminal colors fix
set-option -sg escape-time 50
set-option -sa terminal-overrides ",xterm*:Tc"

# Mouse support
set -g mouse on

# Index windows and panes from 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set vi-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection

# Set repeat time to 1 second
set -g repeat-time 1000

# Resize panes
bind-key -r -T prefix K resize-pane -U 5
bind-key -r -T prefix J resize-pane -D 5
bind-key -r -T prefix H resize-pane -L 5
bind-key -r -T prefix L resize-pane -R 5

# Move current window left or right
bind-key -n C-Left swap-window -dt -1
bind-key -n C-Right swap-window -dt +1

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Remap prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Custom bindings
bind v copy-mode
bind P paste-buffer
bind / run-shell "tmux copy-mode; tmux send-keys ?"

# Reset & clear pane history
bind r send-keys -R \; send-keys C-l \; clear-history

# Theme config
set -g @tokyo-night-tmux-theme night
set -g @tokyo-night-tmux_transparent 0
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style hide
set -g @tokyo-night-tmux_zoom_id_style fsquare

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Install tpm if it's not there yet
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
